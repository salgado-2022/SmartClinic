services:

  # ============================================
  # Aplicación PHP + Apache
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartclinic_app
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: smartclinic_user
      DB_PASSWORD: smartclinic_pass
      DB_NAME: smartclinic
    volumes:
      - ./app:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # Base de datos MySQL
  # ============================================
  db:
    image: mysql:8.0
    container_name: smartclinic_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: smartclinic
      MYSQL_USER: smartclinic_user
      MYSQL_PASSWORD: smartclinic_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # Jenkins - Servidor de Integración Continua
  # ============================================
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: smartclinic_jenkins
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
    user: root
    restart: unless-stopped

volumes:
  db_data:
  jenkins_data:
